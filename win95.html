<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Windows 95 Desktop Simulator</title>
    <style>
        /* 基礎設置 */
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #008080; /* 經典青色 */
            font-family: "MS Sans Serif", "Tahoma", sans-serif;
            cursor: default;
        }

        /* 桌面圖示區域 */
        .desktop {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            height: calc(100% - 40px);
        }

        .icon {
            width: 70px;
            text-align: center;
            color: white;
            font-size: 12px;
            text-shadow: 1px 1px #000;
            cursor: pointer;
        }

        .icon-img {
            width: 32px;
            height: 32px;
            background: #c0c0c0;
            margin: 0 auto 5px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #000;
            text-shadow: none;
        }

        /* 視窗樣式 */
        .window {
            position: absolute;
            top: 20%;
            left: 30%;
            background-color: #c0c0c0;
            width: 350px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0px #000;
            padding: 2px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
        }

        .window-body { padding: 20px; font-size: 13px; }

        /* 工作列 (Taskbar) */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            display: flex;
            align-items: center;
            padding: 2px;
            z-index: 1000;
        }

        .start-button {
            display: flex;
            align-items: center;
            padding: 0 6px;
            font-weight: bold;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            height: 22px;
            font-size: 12px;
            cursor: pointer;
        }

        .start-button:active { border-color: #808080 #ffffff #ffffff #808080; }

        .taskbar-item {
            margin-left: 5px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 0 10px;
            font-size: 12px;
            height: 22px;
            line-height: 20px;
            background: #c0c0c0;
        }

        .tray {
            margin-left: auto;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 2px 8px;
            font-size: 12px;
            height: 18px;
        }
        /* 開始選單樣式 */
        .start-menu {
            position: fixed;
            bottom: 30px;
            left: 2px;
            width: 160px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            display: none; /* 平時隱藏 */
            flex-direction: column;
            z-index: 1001;
            box-shadow: 1px 1px 0px #000;
        }

        .start-menu-item {
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .start-menu-item:hover {
            background-color: #000080;
            color: white;
        }
    </style>
</head>
<body>
<audio id="winClick" src="https://www.soundjay.com/buttons/button-16.mp3" preload="auto"></audio>
<div class="desktop">
<div class="icon" ondblclick="console.log('Clicked!'); openMyComputer()" style="cursor: pointer;">        <div class="icon-img">📂</div>
        我的電腦
    </div>
    <div class="icon">
        <div class="icon-img">🗑️</div>
        資源回收筒
    </div>
</div>

<<!-- 1. 歡迎視窗 -->
    <div class="window" id="welcomeWindow" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
        <div class="title-bar">
            <span>歡迎</span>
            <span onclick="closeWindow()" style="font-size: 11px; cursor: pointer; padding: 2px 5px; border: 1px solid #777; background: #c0c0c0;">X</span>
        </div>
        <div class="window-body">
            <p>Windows 95 桌面模擬器已啟動。</p>
        </div>
    </div>

    <!-- 2. 我的電腦視窗 (預設隱藏) -->
    <div class="window" id="myComputerWindow" style="display:none; width:300px; height:200px; position:absolute; top:100px; left:100px;">
        <div class="title-bar" id="myCompTitle">
            <span>我的電腦</span>
            <button onclick="closeMyComputer()" style="cursor:pointer;">X</button>
        </div>
        <div class="window-body">
            <p>磁碟機 (C:)</p>
            <p>光碟機 (D:)</p>
        </div>
    </div>
    </div>
    <div class="window-body">
        <p>Windows 95 桌面模擬器已啟動。</p>
    </div>
</div>
<!-- 開始選單 -->
<div class="start-menu" id="startMenu">
    <div class="start-menu-item">📁 程式集 (P)</div>
    <div class="start-menu-item">🔍 尋找 (F)</div>
    <div class="start-menu-item">❓ 說明 (H)</div>
    <hr style="width: 95%;">
    <div class="start-menu-item" onclick="location.reload()">🔒 關機 (U)...</div>
</div>
<div class="taskbar">
<div class="start-button" onclick="toggleStartMenu()">開始</div>
    <div class="taskbar-item">歡迎</div>
    <div class="tray" id="clock">12:00 PM</div>
</div>

<script>
        // --- 1. 時鐘功能 ---
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const clockElement = document.getElementById('clock');
            if (clockElement) clockElement.innerText = timeString;
        }

        // --- 2. 音效功能 ---
        function playSound() {
            const audio = document.getElementById('winClick');
            audio.currentTime = 0; // 每次點擊都從頭播放
            audio.play();
        }

        // --- 3. 關閉視窗 (帶音效) ---
        function closeWindow() {
            playSound();
            const win = document.getElementById('welcomeWindow');
            if (win) win.style.display = 'none';
        }

        // --- 4. 開始選單 (帶音效) ---
        function toggleStartMenu() {
            playSound();
            const menu = document.getElementById('startMenu');
            if (menu) {
                menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
            }
        }

        // --- 5. 拖曳視窗功能 ---
        const windowElement = document.getElementById('welcomeWindow');
        const titleBar = windowElement.querySelector('.title-bar');
        let isDragging = false;
        let offsetX, offsetY;

        titleBar.onmousedown = function(e) {
            isDragging = true;
            offsetX = e.clientX - windowElement.offsetLeft;
            offsetY = e.clientY - windowElement.offsetTop;
            windowElement.style.zIndex = 1000; // 拖動時置頂
        };

        document.onmousemove = function(e) {
            if (isDragging) {
                windowElement.style.left = (e.clientX - offsetX) + 'px';
                windowElement.style.top = (e.clientY - offsetY) + 'px';
            }
        };

        document.onmouseup = function() {
            isDragging = false;
        };

        // --- 點擊桌面關閉選單 ---
        window.onclick = function(event) {
            if (!event.target.matches('.start-button')) {
                const menu = document.getElementById('startMenu');
                if (menu) menu.style.display = 'none';
            }
        }

        // 啟動
        updateClock();
        setInterval(updateClock, 1000);
        // --- 新增：開啟「我的電腦」函式 ---
function openMyComputer() {
    console.log("函式被觸發了！"); // 偵錯用
    const win = document.getElementById('myComputerWindow');
    if (win) {
        win.style.display = 'block';
        win.style.zIndex = 1001; // 確保它在最前面
    } else {
        console.log("找不到 id 為 myComputerWindow 的元素，請檢查 HTML 第 168 行");
    }
}

// --- 新增：關閉「我的電腦」函式 ---
function closeMyComputer() {
    const win = document.getElementById('myComputerWindow');
    if (win) {
        win.style.display = 'none';
    }
}
    </script>
</body>
</html>
